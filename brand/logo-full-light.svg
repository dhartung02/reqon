<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" role="img" aria-label="REQON — recon for your career">
  <!-- Master lockup for LIGHT backgrounds: dark wordmark, deeper emerald (#008F66, the contrast-safe
       shade) for the glyph + tagline-muted. Live text (Spline Sans / Fraunces); see brand/README. -->
  <defs>
    <mask id="wm-reticle-l" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#fff"/>
      <line x1="60" y1="60" x2="97" y2="97" stroke="#000" stroke-width="40" stroke-linecap="round"/>
      <rect x="45" y="1" width="10" height="17" fill="#000"/>
      <rect x="45" y="82" width="10" height="17" fill="#000"/>
      <rect x="82" y="45" width="17" height="10" fill="#000"/>
      <rect x="1" y="45" width="17" height="10" fill="#000"/>
    </mask>
  </defs>
  <g font-family="'Spline Sans','Geist','Inter',system-ui,sans-serif" font-weight="700" font-size="150" fill="#16181C" text-anchor="middle">
    <text x="70" y="160">R</text>
    <text x="185" y="160">E</text>
    <text x="300" y="160">Q</text>
    <text x="530" y="160">N</text>
  </g>
  <g transform="translate(355,40) scale(1.2)">
    <g fill="none" stroke="#008F66" stroke-width="10">
      <circle cx="50" cy="50" r="40" mask="url(#wm-reticle-l)"/>
      <line x1="69" y1="69" x2="87" y2="87" stroke-linecap="round"/>
    </g>
    <g stroke="#008F66" stroke-width="7" stroke-linecap="round">
      <line x1="50" y1="29" x2="50" y2="41"/>
      <line x1="50" y1="59" x2="50" y2="71"/>
      <line x1="29" y1="50" x2="41" y2="50"/>
      <line x1="59" y1="50" x2="71" y2="50"/>
    </g>
    <circle cx="50" cy="50" r="3" fill="#008F66"/>
  </g>
  <text x="320" y="212" font-family="'Fraunces',Georgia,serif" font-size="34" letter-spacing="6" fill="#475569" text-anchor="middle">RECON FOR YOUR CAREER</text>
</svg>
