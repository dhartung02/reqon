<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Reqon" style="color:#FFFFFF">
  <!-- Reticle Q (simplified / monochrome): NO micro-gaps, slightly heavier stroke for small sizes
       and OS menu bars. Uses currentColor (defaults white) — set `color` to re-tint. BRAND.md §4. -->
  <defs>
    <mask id="reticle-mono" maskUnits="userSpaceOnUse" x="0" y="0" width="100" height="100">
      <rect width="100" height="100" fill="#fff"/>
      <line x1="60" y1="60" x2="97" y2="97" stroke="#000" stroke-width="36" stroke-linecap="round"/>
    </mask>
  </defs>
  <g fill="none" stroke="currentColor" stroke-width="11">
    <circle cx="50" cy="50" r="40" mask="url(#reticle-mono)"/>
    <line x1="68" y1="68" x2="88" y2="88" stroke-linecap="round"/>
  </g>
</svg>
