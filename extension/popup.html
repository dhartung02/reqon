<!doctype html>
<meta charset="utf-8">
<title>Reqon Clip</title>
<link rel="stylesheet" href="theme.css">
<style>
  body { width: 340px; margin: 0; background: var(--canvas); color: var(--text);
         font: 14px/1.45 var(--sans); -webkit-font-smoothing: antialiased; }
  .wrap { padding: 16px 16px 18px; }
  .head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .head svg { width: 22px; height: 22px; flex: none; }
  .head .titles { flex: 1; min-width: 0; }
  .eyebrow-logo { font: 600 .54rem/1 var(--mono); letter-spacing: .22em; text-transform: uppercase; color: var(--emerald); }
  .head h1 { font: 600 1.12rem/1.1 var(--serif); margin: 1px 0 0; }
  .gear { background: none; border: 0; color: var(--text2); cursor: pointer; font-size: 1rem; padding: 3px; }

  .clip-top { display: flex; gap: 12px; align-items: flex-start; }
  .reassure { font-size: .74rem; color: var(--muted); text-align: center; margin: 11px 0 0; }
  #msg { font-size: .82rem; min-height: 1.1em; margin-top: 9px; }

  /* settings view */
  .settings { margin-top: 4px; display: none; flex-direction: column; gap: 11px; }
  .settings.open { display: flex; }
  .settings-head { display: flex; align-items: center; gap: 8px; }
  .settings-head h2 { font: 600 1rem var(--serif); margin: 0; flex: 1; }
  .back { background: none; border: 0; color: var(--muted); cursor: pointer; font: .8rem var(--sans); }
  .fld { display: flex; flex-direction: column; gap: 5px; }
  .togrow { display: flex; align-items: center; gap: 9px; font-size: .82rem; color: var(--text); }
  .togrow input { width: auto; }
  .setrow { display: flex; gap: 8px; margin-top: 2px; }
  .setrow .btn { margin-top: 0; }
  .hint { font-size: .72rem; color: var(--muted); margin: 0; }

  /* pending-sync queue */
  .queue { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; display: none; }
  .queue.open { display: block; }
  .queue h2 { font: 600 .62rem/1 var(--mono); letter-spacing: .12em; text-transform: uppercase; color: var(--coral); margin: 0 0 9px; }
  .qitem { display: flex; align-items: center; gap: 6px; font-size: .76rem; color: var(--text2); padding: 6px 0; border-bottom: 1px solid var(--line); }
  .qitem .qlabel { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .qitem .qx { background: none; border: 0; color: var(--muted); cursor: pointer; font-size: .9rem; padding: 0 3px; }
  .qitem .qx:hover { color: var(--coral); }
  .qerr { font-size: .72rem; color: var(--coral); margin: 7px 0 0; }
  .qmeta { font-size: .7rem; color: var(--muted); margin-top: 4px; }
  .qrow { display: flex; gap: 8px; margin-top: 10px; }
  .qrow .btn { margin-top: 0; padding: 9px; font-size: .8rem; }
</style>
<div class="wrap">
  <div class="head">
    <svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="35" stroke="var(--emerald)" stroke-width="10" stroke-dasharray="70 15 70 15"></circle><line x1="50" y1="50" x2="75" y2="75" stroke="var(--emerald)" stroke-width="10" stroke-linecap="round"></line></svg>
    <div class="titles">
      <div class="eyebrow-logo">Reqon</div>
      <h1>Clip this job</h1>
    </div>
    <button id="themeBtn" class="themebtn" type="button" title="Appearance"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.6" fill="currentColor" stroke="none"></circle><path d="M12 2.5v2.5M12 19v2.5M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M2.5 12h2.5M19 12h2.5M4.6 19.4l1.8-1.8M17.6 6.4l1.8-1.8"></path></svg></button>
    <button id="gear" class="gear" title="Settings">⚙</button>
  </div>

  <div id="card" class="card">
    <div class="muted">Loading…</div>
  </div>
  <button id="panel" class="btn btn-ghost">📊 Open analytics panel</button>
  <p class="reassure">Reqon never submits anything for you.</p>
  <div id="msg"></div>

  <div id="queue" class="queue">
    <h2>Pending sync (<span id="qcount">0</span>)</h2>
    <div id="qlist"></div>
    <div id="qerr" class="qerr"></div>
    <div id="qmeta" class="qmeta"></div>
    <div class="qrow">
      <button id="qretry" class="btn btn-primary" style="flex:1">Retry now</button>
      <button id="qclear" class="btn btn-ghost" style="flex:1">Clear all</button>
    </div>
  </div>

  <div id="settings" class="settings">
    <div class="settings-head">
      <h2>Connect your board</h2>
      <button id="settingsBack" class="back" type="button">← back</button>
    </div>
    <label class="fld"><span class="eyebrow">Where's your board</span>
      <select id="serverPreset">
        <option value="cloud">Reqon Cloud</option>
        <option value="personal">My own server…</option>
      </select>
    </label>
    <div id="customOriginWrap" class="fld" style="display:none">
      <span class="eyebrow">Server URL</span>
      <input id="origin" type="url" placeholder="https://your-server.com">
    </div>
    <label class="fld"><span class="eyebrow">Username</span>
      <input id="username" type="text" placeholder="you@example.com" autocomplete="username"></label>
    <label class="fld"><span class="eyebrow">Password</span>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"></label>
    <div class="togrow"><input id="overlay" type="checkbox"><label for="overlay">Show the helper on job postings</label></div>
    <div class="togrow"><input id="notify" type="checkbox"><label for="notify">Notify me when I clip or mark applied</label></div>
    <label class="fld"><span class="eyebrow">Appearance</span>
      <div class="seg" id="themeSeg">
        <button type="button" data-pref="system">System</button>
        <button type="button" data-pref="light">Light</button>
        <button type="button" data-pref="dark">Dark</button>
      </div>
    </label>
    <div class="setrow">
      <button id="save" class="btn btn-primary" style="flex:1">Connect</button>
      <button id="test" class="btn btn-ghost" style="flex:1">Test</button>
    </div>
  </div>
</div>
<script src="theme.js"></script>
<script src="settings-lib.js"></script>
<script src="ui-lib.js"></script>
<script src="popup.js"></script>
