<!doctype html>
<meta charset="utf-8">
<title>Reqon</title>
<link rel="stylesheet" href="theme.css">
<style>
  body { margin: 0; background: var(--canvas); color: var(--text);
         font: 13px/1.45 var(--sans); -webkit-font-smoothing: antialiased; }
  .head { display: flex; align-items: center; gap: 9px; padding: 14px 16px; border-bottom: 1px solid var(--line); background: var(--elem); position: sticky; top: 0; z-index: 5; }
  .head svg { width: 18px; height: 18px; flex: none; }
  .logo { font: 600 .6rem/1 var(--mono); letter-spacing: .24em; text-transform: uppercase; color: var(--emerald); flex: 1; }
  .iconbtn { background: none; border: 0; color: var(--muted); cursor: pointer; font-size: .95rem; padding: 2px 5px; border-radius: 6px; }
  .iconbtn:hover { color: var(--text); }
  .wrap { padding: 16px; }
  .assist-frame { display: flex; flex-direction: column; gap: 16px; }
  .assist-frame[data-mode="today"] #coverageSection { display: none; }
  .assist-header { padding: 14px 16px 0; }
  .assist-kicker { font: 600 .6rem/1 var(--mono); letter-spacing: .14em; text-transform: uppercase; color: var(--emerald); }
  .assist-title { margin-top: 6px; font: 600 1.3rem/1.1 var(--serif); color: var(--text); }
  .assist-subtitle { margin-top: 6px; color: var(--muted); font-size: .8rem; }
  .assist-card { background: linear-gradient(180deg, color-mix(in srgb, var(--elem) 92%, transparent), var(--elem2)); border: 1px solid var(--line); border-radius: 14px; padding: 12px; box-shadow: 0 14px 30px rgba(5, 10, 17, 0.18); }
  .assist-summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
  .assist-stat { border: 1px solid var(--line); border-radius: 10px; padding: 9px; background: rgba(255,255,255,0.02); }
  .assist-stat-value { font: 600 1.15rem/1 var(--serif); color: var(--text); }
  .assist-stat-label { margin-top: 4px; font: 600 .6rem/1 var(--mono); letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .assist-card-grid { display: grid; gap: 8px; margin-top: 12px; }
  .assist-mini { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: rgba(255,255,255,0.02); }
  .assist-mini-title { font-weight: 600; font-size: .82rem; color: var(--text); }
  .assist-mini-copy { margin-top: 4px; color: var(--muted); font-size: .74rem; }
  .assist-actions { display: flex; gap: 7px; margin-top: 12px; }
  .assist-actions .btn { flex: 1; }
  .sect-title { font: 600 .6rem/1 var(--mono); letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 16px 0 8px; }
  .sect-title:first-of-type { margin-top: 0; }

  .page-top { display: flex; gap: 11px; align-items: flex-start; }
  .btn { padding: 9px; font-size: .8rem; }
  .btnrow { display: flex; gap: 7px; }
  .btnrow .btn { flex: 1; }

  /* KPI grid */
  .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .kpi { background: var(--elem); border: 1px solid var(--line); border-radius: 10px; padding: 11px; }
  .kpi-v { font: 600 1.4rem/1 var(--serif); color: var(--text); }
  .kpi-v.accent { color: var(--emerald); } .kpi-v.teal { color: var(--teal); }
  .kpi-l { font: 600 .6rem/1 var(--mono); letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  /* tier bar */
  .bar { display: flex; height: 9px; border-radius: 6px; overflow: hidden; margin: 0 0 8px; background: var(--elem2); }
  .bar span { display: block; height: 100%; }
  .bar .tA { background: var(--emerald); } .bar .tB { background: var(--info); } .bar .tC { background: var(--muted); }
  .legend { display: flex; gap: 13px; flex-wrap: wrap; font-size: .7rem; color: var(--text2); }
  .legend i { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }

  /* best-bets filters + expander */
  .oppfilters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .oppchip { font: 600 .7rem var(--sans); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--line2); background: transparent; color: var(--text2); cursor: pointer; }
  .oppchip:hover { border-color: var(--emerald); }
  .oppchip.on { background: var(--ringbg); border-color: var(--emerald); color: var(--emerald); }
  .oppmore { width: 100%; margin-top: 9px; padding: 7px; font: 600 .74rem var(--sans); background: transparent; border: 1px solid var(--line2); border-radius: 8px; color: var(--text2); cursor: pointer; }
  .oppmore:hover { border-color: var(--emerald); color: var(--emerald); }

  /* opportunity list */
  .opp { display: flex; align-items: center; gap: 9px; padding: 9px 0; border-top: 1px solid var(--line); cursor: pointer; }
  .opp:first-child { border-top: 0; }
  .opp:hover .opp-role { color: var(--emerald); }
  .opp-main { flex: 1; min-width: 0; }
  .opp-role { font-weight: 600; font-size: .8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .opp-co { font-size: .7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .opp-ev { font: 700 .76rem var(--mono); color: var(--tier); flex: none; }

  /* résumé match */
  .cov-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .cov-pct { font: 600 1.1rem var(--serif); }
  .cov-pct.good { color: var(--emerald); } .cov-pct.mid { color: var(--amber); } .cov-pct.low { color: var(--coral); }
  .cov-bar { height: 7px; border-radius: 6px; background: var(--elem2); overflow: hidden; margin-bottom: 11px; }
  .cov-bar > span { display: block; height: 100%; background: var(--emerald); }
  .cov-bar > span.mid { background: var(--amber); } .cov-bar > span.low { background: var(--coral); }
  .kw { display: inline-block; font-size: .7rem; padding: 3px 9px; border-radius: 20px; margin: 4px 4px 0 0;
        border: 1px solid var(--line2); color: var(--text2); }
  .kw.hit { border-color: color-mix(in srgb, var(--emerald) 38%, var(--line2)); color: var(--text); }
  .kw.hit::before { content: "✓"; color: var(--emerald); font-weight: 700; margin-right: 5px; }
  .covai { margin-top: 12px; }
  .covai-head { border-top: 1px dashed var(--line); padding-top: 11px; }

  /* AI assist */
  .draft { margin-top: 10px; background: var(--elem2); border: 1px solid var(--line); border-radius: 8px; padding: 10px; white-space: pre-wrap; font-size: .82rem; color: var(--text); }
  .draft-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 8px; }
  .copybtn { background: transparent; border: 1px solid var(--line2); color: var(--text); border-radius: 7px; padding: 5px 11px; font: 600 .76rem var(--sans); cursor: pointer; }
  .copybtn:hover { border-color: var(--emerald); }
  .tok { font-size: .72rem; color: var(--muted); }

  /* usage */
  .urow { display: flex; align-items: baseline; justify-content: space-between; margin: 5px 0; font-size: .8rem; }
  .urow .v { font: 700 .85rem var(--mono); color: var(--text); }
  .budget { height: 7px; border-radius: 6px; background: var(--elem2); overflow: hidden; margin: 8px 0 4px; }
  .budget span { display: block; height: 100%; background: var(--emerald); }
  .budget span.warn { background: var(--amber); } .budget span.over { background: var(--coral); }

  #msg { font-size: .78rem; min-height: 1em; margin-top: 8px; }

  /* tracking-field editor (parity with the board's expanded-card tracking strip) */
  .tk { margin-top: 10px; border: 1px solid var(--line); border-radius: 8px; background: var(--elem2); }
  .tk > summary { cursor: pointer; padding: 8px 10px; font-size: .78rem; color: var(--text2); list-style: none; }
  .tk > summary::-webkit-details-marker { display: none; }
  .tk-body { padding: 4px 10px 10px; display: flex; flex-direction: column; gap: 7px; }
  .tk-row { display: flex; align-items: center; gap: 8px; }
  .tk-lbl { flex: 0 0 108px; font-size: .73rem; color: var(--muted); }
  .tk-in { font-size: .78rem; padding: 5px 7px; }
  .tk-note { font-size: .72rem; color: var(--muted); }
</style>
<div class="head">
  <svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="35" stroke="var(--emerald)" stroke-width="10" stroke-dasharray="70 15 70 15"></circle><line x1="50" y1="50" x2="75" y2="75" stroke="var(--emerald)" stroke-width="10" stroke-linecap="round"></line></svg>
  <span class="logo">Reqon</span>
  <button id="themeBtn" class="themebtn" type="button" title="Appearance"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.6" fill="currentColor" stroke="none"></circle><path d="M12 2.5v2.5M12 19v2.5M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M2.5 12h2.5M19 12h2.5M4.6 19.4l1.8-1.8M17.6 6.4l1.8-1.8"></path></svg></button>
  <button id="refresh" class="iconbtn" title="Refresh">⟳</button>
</div>
<div id="assistantRoot" class="wrap assist-frame" data-mode="today">
  <section id="assistantHeader" class="assist-header">
    <div class="assist-kicker">Reqon Assistant</div>
    <div class="assist-title">Today</div>
    <div class="assist-subtitle">Loading your workspace…</div>
  </section>

  <section id="pageSection">
    <div id="pageTitle" class="sect-title">Today</div>
    <div id="page" class="card"><div class="muted">Loading…</div></div>
  </section>

  <section id="coverageSection">
    <div class="sect-title">Resume match</div>
    <div id="coverage" class="card"><div class="muted">Open a job posting to see your resume match.</div></div>
  </section>

  <section id="aiSection">
    <div class="sect-title">Draft an answer</div>
    <div id="ai" class="card">
      <select id="aiKind">
        <option value="answer">Reusable answer</option>
        <option value="screening">Screening question</option>
        <option value="cover">Cover note</option>
      </select>
      <textarea id="aiQ" placeholder="Paste the application question…" style="margin-top:8px;min-height:54px;resize:vertical"></textarea>
      <button id="aiDraft" class="btn btn-primary">✦ Draft with AI</button>
      <div id="aiOut"></div>
    </div>
  </section>

  <section id="pipelineSection">
    <div class="sect-title">Your pipeline</div>
    <div id="kpis" class="kpis"></div>
    <div class="card" style="margin-top:8px">
      <div id="tierbar"></div>
    </div>
  </section>

  <section id="oppsSection">
    <div class="sect-title">Best bets to apply</div>
    <div id="oppsFilters" class="oppfilters"></div>
    <div id="opps" class="card"><div class="muted">Loading…</div></div>
  </section>

  <section id="usageSection">
    <div class="sect-title">AI usage</div>
    <div id="usage" class="card"><div class="muted">Loading…</div></div>
  </section>

  <div id="msg"></div>
  <a id="board" class="link" href="#" style="margin-top:-2px">Open board ↗</a>
</div>
<script src="lib.js"></script>
<script src="ui-lib.js"></script>
<script src="theme.js"></script>
<script src="sidepanel-mode.js"></script>
<script src="sidepanel.js"></script>
